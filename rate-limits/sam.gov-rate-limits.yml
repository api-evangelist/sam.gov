description: Rate-limits artifact for SAM.gov. Trimmed to a single umbrella entry pending manual reconciliation.
  SAM.gov is a free public federal API operated by GSA. There is no fee. Specific per-day request limits
  vary by user role (federal, non-federal, general) and are not published as concrete numbers on the public
  docs; users must contact GSA via fsd.gov for the applicable threshold.
sources:
- https://open.gsa.gov/api/get-opportunities-public-api/
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
- name: Public API daily quota
  scope: api-key
  metric: varies
  limit: role-based daily request quota; see open.gsa.gov docs and fsd.gov for specifics
  notes: Documented as varying by federal / non-federal / general user role. Concrete numbers are not
    published; contact fsd.gov.
policies:
- name: API Key Required
  description: All requests require a free public API key from the SAM.gov account page.
- name: Role-Based Quotas
  description: Daily request thresholds differ by federal vs non-federal vs general role. Numbers are
    not published; contact fsd.gov for the limit applicable to your account.
- name: Pagination Limit
  description: The `limit` query parameter accepts up to 1,000 records per page.
notes: SAM.gov is a free public federal API operated by GSA. There is no fee. Specific per-day request
  limits vary by user role (federal, non-federal, general) and are not published as concrete numbers on
  the public docs; users must contact GSA via fsd.gov for the applicable threshold.
