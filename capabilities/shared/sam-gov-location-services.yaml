naftiko: "1.0.0-alpha1"

info:
  label: "SAM.gov Location Services API"
  description: >-
    The SAM.gov Public Location Services API provides validated city, state, and ZIP
    code data for use in federal procurement and vendor registration forms. Requires
    a SAM.gov System Account API key.
  tags:
    - Government
    - Location Services
    - Validation
    - GSA
    - Federal Procurement
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAM_GOV_API_KEY: SAM_GOV_API_KEY

capability:
  consumes:
    - type: http
      namespace: sam-location
      baseUri: https://api.sam.gov
      description: "SAM.gov Public Location Services API"
      authentication:
        type: apikey
        key: api_key
        value: "{{SAM_GOV_API_KEY}}"
        placement: query
      resources:

        - name: cities
          path: /locationservices/v1/cities
          description: "City lookup and validation"
          operations:
            - name: get-cities
              method: GET
              description: "Get a list of cities for a given country code"
              inputParameters:
                - name: cc
                  in: query
                  type: string
                  required: false
                  description: "Country code (ISO 3166-1 alpha-2)"
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Search query for city name"
                - name: active
                  in: query
                  type: string
                  required: false
                  description: "Filter active cities (Y/N)"
                - name: citycode
                  in: query
                  type: string
                  required: false
                  description: "Filter by city code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: states
          path: /locationservices/v1/states
          description: "State and province lookup"
          operations:
            - name: get-states
              method: GET
              description: "Get a list of states and provinces"
              inputParameters:
                - name: cc
                  in: query
                  type: string
                  required: false
                  description: "Country code (ISO 3166-1 alpha-2)"
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Search query for state name"
                - name: active
                  in: query
                  type: string
                  required: false
                  description: "Filter active states (Y/N)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: zip
          path: /locationservices/v1/zip
          description: "ZIP code validation"
          operations:
            - name: validate-zip-code
              method: GET
              description: "Validate a ZIP code and get associated city/county data"
              inputParameters:
                - name: zip
                  in: query
                  type: string
                  required: true
                  description: "ZIP code to validate"
                - name: statecode
                  in: query
                  type: string
                  required: false
                  description: "State code filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sam-location-rest
      resources:
        - path: /v1/cities
          name: cities
          operations:
            - method: GET
              name: get-cities
              description: "Get SAM.gov city list"
              call: "sam-location.get-cities"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/states
          name: states
          operations:
            - method: GET
              name: get-states
              description: "Get SAM.gov state list"
              call: "sam-location.get-states"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/zip
          name: zip
          operations:
            - method: GET
              name: validate-zip
              description: "Validate ZIP code"
              call: "sam-location.validate-zip-code"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sam-location-mcp
      transport: http
      tools:
        - name: get-cities
          description: "Retrieve SAM.gov validated city list by country code"
          hints:
            readOnly: true
            idempotent: true
          call: "sam-location.get-cities"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-states
          description: "Retrieve SAM.gov validated state and province list"
          hints:
            readOnly: true
            idempotent: true
          call: "sam-location.get-states"
          outputParameters:
            - type: object
              mapping: "$."
        - name: validate-zip-code
          description: "Validate a ZIP code against SAM.gov location data"
          hints:
            readOnly: true
            idempotent: true
          call: "sam-location.validate-zip-code"
          outputParameters:
            - type: object
              mapping: "$."
