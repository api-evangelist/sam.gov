meters:
- name: api_requests
  unit: request
  aggregation: sum
  dimensions:
  - endpoint
  - user_role
principles:
- name: Visibility
  description: There is no cost to consume; track per-endpoint daily request counts against the role-based
    quota documented at open.gsa.gov.
- name: Allocation
  description: Allocate by SAM.gov API key per consuming application; tag downstream spend (e.g. ETL compute,
    storage) by data product.
- name: Optimization
  description: Cache opportunities and entity records aggressively, page with the max 1,000 records per
    request, and use delta queries via posted_from/posted_to filters to avoid full re-scans.
- name: Accountability
  description: 'Owner: data-engineering team responsible for the SAM.gov ingest job. Quota breaches are
    operational issues, not financial.'
notes: SAM.gov is a free public federal API operated by GSA. There is no fee. Specific per-day request
  limits vary by user role (federal, non-federal, general) and are not published as concrete numbers on
  the public docs; users must contact GSA via fsd.gov for the applicable threshold.
