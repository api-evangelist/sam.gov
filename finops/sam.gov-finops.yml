description: FOCUS-aligned FinOps artifact for SAM.gov. Pricing is gated; meters and principles describe
  the expected billing surface. SAM.gov is a free public federal API operated by GSA. There is no fee.
  Specific per-day request limits vary by user role (federal, non-federal, general) and are not published
  as concrete numbers on the public docs; users must contact GSA via fsd.gov for the applicable threshold.
