aid: sam.gov
name: SAM.gov
description: >-
  SAM.gov (System for Award Management) is the official US government system
  for vendor registration and federal procurement. The SAM.gov Public Location
  Services API provides Location Services data including Country, State, City,
  and ZIP code validation for data submitted to SAM.gov.
