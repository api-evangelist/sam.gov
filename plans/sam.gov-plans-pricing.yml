provider: SAM.gov
providerId: sam.gov
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
- Contracts
- Entity Management
- Federal Government
- GSA
- Procurement
description: Plans/pricing artifact for SAM.gov. Trimmed to a single Free Public API entry pending manual
  reconciliation. SAM.gov is a free public federal API operated by GSA. There is no fee. Specific per-day
  request limits vary by user role (federal, non-federal, general) and are not published as concrete numbers
  on the public docs; users must contact GSA via fsd.gov for the applicable threshold.
sources:
- https://open.gsa.gov/api/get-opportunities-public-api/
plans:
- id: sam.gov-free-public
  name: Free Public API
  type: freemium
  description: Free access to SAM.gov public APIs (Opportunities, Entity, Federal Hierarchy, Exclusions,
    etc.) with a free public API key obtained from a SAM.gov account. No fees; per-day request thresholds
    vary by user role.
  entries:
  - label: Public API Access
    name: public_api_access
    type: quota
    metric: request
    limit: see https://open.gsa.gov/api/get-opportunities-public-api/ — role-based daily limits, contact
      fsd.gov
    timeFrame: day
    geo: US
    unit: 1
    price: '0.00'
    userMultiplied: false
  elements:
  - name: Opportunities API
  - name: Entity Management API
  - name: Federal Hierarchy API
  - name: Exclusions API
  - name: Public API Key (free, via SAM.gov account)
notes: SAM.gov is a free public federal API operated by GSA. There is no fee. Specific per-day request
  limits vary by user role (federal, non-federal, general) and are not published as concrete numbers on
  the public docs; users must contact GSA via fsd.gov for the applicable threshold.
